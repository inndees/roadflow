<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <title>RoadFlow </title>
</head>

<body>
    <div class="container bg-primary text-white text-center p-5">
        <p>Hello, I am RoadFlow</p>
    </div>

    <form method="POST">
        <label for="roadLength">Road Length:</label>
        <input type="number" step="0.01" id="roadLength" name="roadLength" required>
        <button type="submit" class="btn btn-success">Submit</button>
    </form>


    {% if total_time is not none %}
        <p>Total Time: {{ total_time }} days</p>
    {% endif %}
</body>

</html>
